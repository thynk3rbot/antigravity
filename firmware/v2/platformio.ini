; ============================================================================
; Environment: Heltec V2 (Hub) - SX1276
; ============================================================================
[env:heltec_v2_hub]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
board_build.partitions = huge_app.csv
lib_ldf_mode = chain+
lib_deps =
    jgromes/RadioLib @ ^6.4.0
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.2
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.3
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1.0
    h2zero/NimBLE-Arduino @ ^1.4.3
    arkhipenko/TaskScheduler @ ^3.8.5
    mikalhart/TinyGPSPlus @ ^1.1.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.3\"
    -D LORALINK_V2
    -D ROLE_HUB
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM3
upload_port = COM3
upload_speed = 921600

; ============================================================================
; Environment: Heltec V3 (Node) - SX1262
; ============================================================================
[env:heltec_v3_node]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    ${env:heltec_v2_hub.lib_deps}
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.3\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 115200
upload_flags = --no-stub

; ============================================================================
; Environment: Heltec V4 (Node) - SX1262 + PSRAM
; ============================================================================
[env:heltec_v4_node]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    ${env:heltec_v2_hub.lib_deps}
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.3\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V4
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 115200
upload_flags = --no-stub

; ============================================================================
; Fleet Device: HV2 node
; ============================================================================
[env:hv2_usb]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
board_build.partitions = huge_app.csv
lib_deps =
    ${env:heltec_v2_hub.lib_deps}
build_flags =
    -std=c++17
    -fexceptions
    -D FIRMWARE_VERSION=\"0.2.3\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
monitor_speed = 115200
upload_port = COM20
upload_speed = 921600
