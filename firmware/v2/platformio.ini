# = [env:native] (Host-side Unit Testing) =
[env:native]
platform = native
build_flags = 
    -std=c++17
    -D UNIT_TEST
    -D LORALINK_V2
    -I test/mocks
    -I lib/App
    -I lib/HAL
    -I lib/Transport
lib_deps = 
    bblanchon/ArduinoJson @ ^6.21.3
