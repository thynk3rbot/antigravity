[platformio]
default_envs = heltec_v2_hub
src_dir = src
lib_dir = lib
include_dir = include

; ============================================================================
; Bench Mode: Uncomment below to enable hardware diagnostics
; ============================================================================
; To enable bench mode for any environment:
; 1. Add: -D BENCH_MODE to the build_flags section
; 2. Rebuild: platformio run --environment <target>
; 3. Check serial output for diagnostic results
;
; Example:
; build_flags =
;     -std=c++17
;     -fexceptions
;     -Wall -Wextra
;     -D FIRMWARE_VERSION=\"0.2.2\"
;     -D LORALINK_V2
;     -D ROLE_HUB
;     -D RADIO_SX1276
;     -D ARDUINO_HELTEC_WIFI_LORA_32
;     -D BENCH_MODE
; ============================================================================

; ============================================================================
; Environment: Heltec V2 (Hub) - SX1276
; ============================================================================
[env:heltec_v2_hub]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D ROLE_HUB
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM3
upload_port = COM3
upload_speed = 921600

; ============================================================================
; Fleet Device: HV2 node — COM20 (USB serial, full build)
; ============================================================================
[env:hv2_usb]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
build_flags =
    -std=c++17
    -fexceptions
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM20
upload_port = COM20
upload_speed = 921600

; ============================================================================
; Fleet Device: HV2 node — full build (same stack as all envs)
; Only strip libs here if flash overflow is confirmed on hv2_usb.
; ============================================================================
[env:hv2_minimal]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
build_type = release
build_flags =
    -std=c++17
    -fexceptions
    -Os
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
    -D CORE_DEBUG_LEVEL=0
    -D ARDUHAL_LOG_LEVEL=0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM20
upload_port = COM20
upload_speed = 921600

; ============================================================================
; Fleet Device: Peer2V3 — V3 Node OTA at 172.16.0.26
; ============================================================================
[env:peer2_v3_ota]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
build_flags =
    -std=c++17
    -fexceptions
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V3
    -D NODE_ID=\"Peer2V3\"
upload_protocol = esptool
upload_port = COM7
upload_speed = 115200
monitor_speed = 115200
monitor_port = COM7

; ============================================================================
; Environment: Heltec V3 (Node) - SX1262
; ============================================================================
[env:heltec_v3_node]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM7
upload_port = COM7
upload_speed = 115200

; ============================================================================
; Base Configuration for Heltec V4
; ============================================================================
[v4_base]
platform = espressif32 @ 6.7.0
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
    h2zero/NimBLE-Arduino @ ^1.4.1
    arkhipenko/TaskScheduler @ ^3.8.3
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit MCP23017 Arduino Library @ 2.3.2
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.2\"
    -D LORALINK_V2
    -D RADIO_SX1262
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D ARDUINO_HELTEC_WIFI_LORA_32_V4
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 115200
upload_flags = --no-stub

; ============================================================================
; Unified V4 Node (Flash specifying port: pio run -e v4_node -t upload --upload-port COM7)
; ============================================================================
[env:v4_node]
extends = v4_base
build_flags =
    ${v4_base.build_flags}
    -D ROLE_NODE

; ============================================================================
; Environment: Native (Unit Tests, no hardware required)
; ============================================================================
[env:native]
platform = native
test_dir = test
test_framework = unity
build_flags =
    -std=c++17
    -D NATIVE_TEST
    -D ROLE_NODE
    -D RADIO_SX1262
    -D FIRMWARE_VERSION=\"test\"
lib_deps =
    throwtheswitch/Unity @ 2.5.2
