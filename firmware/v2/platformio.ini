[platformio]
default_envs = heltec_v2_hub
src_dir = src
lib_dir = lib
include_dir = include

; ============================================================================
; Bench Mode: Uncomment below to enable hardware diagnostics
; ============================================================================
; To enable bench mode for any environment:
; 1. Add: -D BENCH_MODE to the build_flags section
; 2. Rebuild: platformio run --environment <target>
; 3. Check serial output for diagnostic results
;
; Example:
; build_flags =
;     -std=c++17
;     -fexceptions
;     -Wall -Wextra
;     -D FIRMWARE_VERSION=\"0.2.0\"
;     -D LORALINK_V2
;     -D ROLE_HUB
;     -D RADIO_SX1276
;     -D ARDUINO_HELTEC_WIFI_LORA_32
;     -D BENCH_MODE
; ============================================================================

; ============================================================================
; Environment: Heltec V2 (Hub) - SX1276
; ============================================================================
[env:heltec_v2_hub]
platform = espressif32
board = heltec_wifi_lora_32
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.0\"
    -D LORALINK_V2
    -D ROLE_HUB
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM3
upload_port = COM3
upload_speed = 921600

; ============================================================================
; Environment: Heltec V3 (Node) - SX1262
; ============================================================================
[env:heltec_v3_node]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.0\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM4
upload_port = COM4
upload_speed = 921600

; ============================================================================
; Environment: Heltec V4 (Node) - SX1262 with Native USB + PSRAM
; ============================================================================
[env:heltec_v4_node]
platform = espressif32 @ 6.7.0
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    RadioLib @ 6.4.0
    Adafruit SSD1306 @ 2.5.10
    Adafruit GFX Library @ 1.11.9
    PubSubClient @ 2.8
    ArduinoJson @ 6.21.3
    ESP Async WebServer @ 1.2.3
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.2.0\"
    -D LORALINK_V2
    -D ROLE_NODE
    -D RADIO_SX1262
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D ARDUINO_HELTEC_WIFI_LORA_32_V4
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_port = COM16
upload_port = COM16
upload_speed = 921600

; ============================================================================
; Environment: Native (Unit Tests, no hardware required)
; ============================================================================
[env:native]
platform = native
test_dir = test
test_framework = unity
build_flags =
    -std=c++17
    -D NATIVE_TEST
    -D ROLE_NODE
    -D RADIO_SX1262
    -D FIRMWARE_VERSION=\"test\"
lib_deps =
    throwtheswitch/Unity @ 2.5.2
