; ============================================================================
; PlatformIO Configuration for LoRaLink v2 (Any2Any Peer-to-Peer Mesh)
; ============================================================================

[platformio]
default_envs = heltec_v4

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
    jgromes/RadioLib @ ^6.4.0
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.2
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.3
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1.0
    h2zero/NimBLE-Arduino @ ^1.4.3
    arkhipenko/TaskScheduler @ ^3.8.5
    mikalhart/TinyGPSPlus @ ^1.1.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
build_flags =
    -std=c++17
    -fexceptions
    -Wall -Wextra
    -D FIRMWARE_VERSION=\"0.0.14\"
    -D LORALINK_V2
    -D ENABLE_MQTT_TRANSPORT
lib_ldf_mode = deep+
extra_scripts = pre:../../increment_version.py
; Increment version on every flash so you can confirm OTA/USB flash succeeded
VERSION_AUTO_INCREMENT = true

; ============================================================================
; Environment: Heltec V2 (ESP32)
; ============================================================================
[env:heltec_v2]
extends = common
board = heltec_wifi_lora_32
board_build.partitions = min_spiffs.csv
build_flags =
    ${common.build_flags}
    -D RADIO_SX1276
    -D ARDUINO_HELTEC_WIFI_LORA_32
upload_speed = 115200

; ============================================================================
; Environment: Heltec V3 (ESP32-S3)
; ============================================================================
[env:heltec_v3]
extends = common
board = heltec_wifi_lora_32_V3
board_build.partitions = default_8MB.csv
build_flags = 
    ${common.build_flags}
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
upload_speed = 921600
; upload_flags = --no-stub

; ============================================================================
; Environment: Heltec V4 (ESP32-S3 + GPS)
; ============================================================================
[env:heltec_v4]
extends = common
board = heltec_wifi_lora_32_V3
board_build.partitions = default_8MB.csv
build_flags = 
    ${common.build_flags}
    -D RADIO_SX1262
    -D ARDUINO_HELTEC_WIFI_LORA_32_V4
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D HAS_GPS
    -mfix-esp32-psram-cache-issue
board_build.arduino.memory_type = qio_qspi
board_build.flash_size = 16MB
board_build.flash_mode = dio
upload_speed = 921600
; upload_flags = --no-stub

; ============================================================================
; Environment: Heltec V4 OTA (172.16.0.29)
; ============================================================================
[env:heltec_v4_ota_29]
extends = env:heltec_v4
upload_protocol = espota
upload_port = 172.16.0.29
upload_flags = 
build_flags = 
    ${env:heltec_v4.build_flags}
    -D DEVICE_NAME=\"Peer-OTA-29\"

