[platformio]
default_envs = heltec_wifi_lora_32_V3

[common]
lib_deps =
    heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.2
    jgromes/RadioLib @ ^6.4.0
    bblanchon/ArduinoJson @ ^7.0.4
    arkhipenko/TaskScheduler @ ^3.7.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.0
    mikalhart/TinyGPSPlus @ ^1.0.3

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -D SUPPORT_WIFI
    -D SUPPORT_BLE
    -D SUPPORT_ESPNOW
    -D SUPPORT_DISPLAY
    -D SUPPORT_SENSORS
    -D SUPPORT_GPS
    -D _TASK_INLINE
    -std=gnu++17

; ── Heltec WiFi LoRa 32 V3 (ESP32-S3) ────────────────────────────────────────
[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = ${common.lib_deps}
lib_ldf_mode = deep+
board_build.partitions = min_spiffs.csv
build_unflags =
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
build_flags =
    ${common.build_flags}
    -D ARDUINO_LORA_HELTEC_V3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ── Heltec WiFi LoRa 32 V4 (ESP32-S3) ────────────────────────────────────────
[env:heltec_wifi_lora_32_V4]
extends = env:heltec_wifi_lora_32_V3
build_flags =
    ${common.build_flags}
    -D ARDUINO_LORA_HELTEC_V4
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ── Heltec WiFi LoRa 32 V2 (ESP32) ───────────────────────────────────────────
[env:heltec_wifi_lora_32_V2]
platform = espressif32
board = heltec_wifi_lora_32_V2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = ${common.lib_deps}
board_build.partitions = huge_app.csv
build_flags =
    ${common.build_flags}
    -D ARDUINO_LORA_HELTEC_V2

; ── Generic OTA Environments (Target-agnostic IPs) ───────────────────────────
[env:v3_ota]
extends = env:heltec_wifi_lora_32_V3
upload_protocol = espota

[env:v4_ota]
extends = env:heltec_wifi_lora_32_V4
upload_protocol = espota

[env:v2_ota]
extends = env:heltec_wifi_lora_32_V2
upload_protocol = espota

; ── Seeeduino XIAO Satellite ─────────────────────────────────────────────────
[env:xiao_satellite]
platform = atmelsam
board = seeed_xiao
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/xiao_satellite/xiao_satellite.cpp>
