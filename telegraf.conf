[global_tags]
environment = "magic"

[agent]
interval = "10s"
round_interval = true
metric_batch_size = 1000
metric_buffer_limit = 10000
flush_interval = "10s"

[[inputs.mqtt_consumer]]
servers = ["tcp://mqtt:1883"]
topics = ["magic/+/telemetry"]
data_format = "json"

[[outputs.influxdb_v2]]
urls = ["http://influxdb:8086"]
token = "magic-dev-token"
organization = "magic"
bucket = "telemetry"
