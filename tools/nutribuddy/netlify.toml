# NutriCalc - Netlify Configuration
# Hydroponic nutrient formula solver deployment

[build]
  # No build command needed - static site
  command = "echo 'Static site - no build required'"
  publish = "."

[dev]
  # Local development settings
  port = 8080
  autoLaunch = false

# Redirect rules
[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/docs/*"
  to = "/docs/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/static/:splat"
  status = 200
  force = false

# Headers for proper content types and caching
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=86400"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Status page for health checks
[[redirects]]
  from = "/.netlify/health"
  to = "/"
  status = 200
