
<svg width="920" height="920" viewBox="0 0 920 920" xmlns="http://www.w3.org/2000/svg">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--accent:#4ade80;--accent2:#60a5fa;--border:#2e3147;--text:#e2e8f0;}
text{font-family:Inter,Segoe UI,sans-serif;letter-spacing:6px;}
@keyframes orbit{from{transform:rotate(0deg);}to{transform:rotate(360deg);}
@keyframes rise{0%{transform:translateY(0);opacity:1;}80%{opacity:1;}100%{transform:translateY(-160px);opacity:0;}}
.spin{animation:orbit 40s linear infinite;transform-origin:460px 460px;}
.riseN{animation:rise 7s infinite;}
.riseP{animation:rise 7s 2.3s infinite;}
.riseK{animation:rise 7s 4.6s infinite;}
</style>
<circle cx="460" cy="460" r="430" fill="var(--bg)" stroke="var(--border)" stroke-width="10"/>
<circle cx="460" cy="460" r="380" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="22 16"/>
<defs><path id="arc2" d="M160 460 A300 300 0 0 1 760 460"/></defs>
<text font-size="72" fill="var(--text)" font-weight="600">
<textPath href="#arc2" startOffset="50%" text-anchor="middle">NUTRICALC</textPath>
</text>
<g class="spin">
<circle cx="460" cy="460" r="300" fill="none" stroke="var(--accent2)" stroke-width="6" opacity="0.6"/>
</g>
<g stroke="var(--accent)" stroke-width="28" stroke-linecap="round">
<line x1="320" y1="300" x2="320" y2="560"/>
<line x1="320" y1="300" x2="520" y2="560"/>
<line x1="520" y1="300" x2="520" y2="560"/>
</g>
<path d="M650 300 A240 240 0 1 0 650 560" stroke="var(--accent2)" stroke-width="28" fill="none" stroke-linecap="round"/>
<rect x="300" y="560" width="320" height="150" rx="32" fill="var(--surface)" stroke="var(--border)" stroke-width="8"/>
<rect x="300" y="620" width="320" height="90" fill="var(--accent2)" opacity="0.22"/>
<g stroke="var(--accent)" stroke-width="8" fill="none">
<path d="M350 560 C320 640 310 700 340 780"/>
<path d="M460 560 C460 640 460 700 460 780"/>
<path d="M570 560 C600 640 610 700 580 780"/>
</g>
<g class="riseN">
<circle cx="340" cy="780" r="18" fill="var(--accent)"/>
<text x="340" y="785" text-anchor="middle" font-size="18" fill="#0f1117">N</text>
</g>
<g class="riseP">
<circle cx="460" cy="780" r="18" fill="var(--accent)"/>
<text x="460" y="785" text-anchor="middle" font-size="18" fill="#0f1117">P</text>
</g>
<g class="riseK">
<circle cx="580" cy="780" r="18" fill="var(--accent)"/>
<text x="580" y="785" text-anchor="middle" font-size="18" fill="#0f1117">K</text>
</g>
<g fill="var(--accent)">
<polygon points="420,260 395,320 445,320"/>
<polygon points="500,260 475,320 525,320"/>
</g>
</svg>
