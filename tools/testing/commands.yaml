# Magic Fleet — Command Metadata Registry
# Single source of truth for all firmware commands.
# Drives integration testing, coverage reporting, and wiring validation.
#
# Fields:
#   name               - exact command string as firmware expects it (uppercase)
#   transports         - which transports can deliver it: http/serial/ble/lora/mqtt/espnow
#   critical           - true if failure has physical consequence or leaves device unreachable
#   wiring_status      - implemented / partial / stub / unknown
#   expected_response_field - one key field to assert in the JSON response
#   display:
#     page             - OLED page where effect is visible (null = no screen effect)
#                        page_1_network | page_2_power | page_3_transports |
#                        page_4_system  | page_5_gps   | page_6_diag       |
#                        header (all pages) | footer (all pages) | splash | off
#     field            - the specific cached field that changes on screen

commands:
  - name: STATUS
    transports: [http, serial, ble, mqtt, espnow]
    critical: true
    wiring_status: implemented
    expected_response_field: version
    display:
      page: footer
      field: version

  - name: VSTATUS
    transports: [http, serial, ble, mqtt, lora, espnow]
    critical: false
    wiring_status: implemented
    expected_response_field: version
    display:
      page: footer
      field: version

  - name: RELAY
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: true
    wiring_status: implemented
    expected_response_field: state
    display:
      page: null
      field: null  # relayOn cached but not rendered on any page yet

  - name: SETWIFI
    transports: [http, serial, ble]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: page_1_network
      field: ip

  - name: SETIP
    transports: [http, serial, ble]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: page_1_network
      field: ip

  - name: SETBROKER
    transports: [http, serial, ble]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: page_3_transports
      field: mqttActive

  - name: BLINK
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: false
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: null
      field: null  # LED blink only — no screen change

  - name: REBOOT
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: splash
      field: null  # triggers full boot splash

  - name: HELP
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: implemented
    expected_response_field: available
    display:
      page: null
      field: null  # serial/BLE response only

  - name: GETCONFIG
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: implemented
    expected_response_field: node_id
    display:
      page: header
      field: deviceName

  - name: SETNAME
    transports: [http, serial, ble]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: header
      field: deviceName

  - name: SCHED
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: stub
    expected_response_field: error
    display:
      page: null
      field: null

  - name: FORWARD
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: false
    wiring_status: stub
    expected_response_field: error
    display:
      page: null
      field: null

  - name: GPS
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: page_5_gps
      field: gpsLat  # also gpsLon, gpsSats, gpsFix

  - name: ASK
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: null
      field: null

  - name: FACTORY_RESET
    transports: [http, serial, ble]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: splash
      field: null  # triggers reboot → splash

  - name: LIST
    transports: [http, serial, ble, lora, mqtt]
    critical: false
    wiring_status: implemented
    expected_response_field: products
    display:
      page: null
      field: null

  - name: LOAD
    transports: [http, serial, ble, lora, mqtt]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: null
      field: null

  - name: SETKEY
    transports: [http, serial, ble]
    critical: true
    wiring_status: partial
    expected_response_field: ok
    display:
      page: null
      field: null

  - name: GPIO
    transports: [http, serial, ble]
    critical: true
    wiring_status: partial
    expected_response_field: ok
    display:
      page: null
      field: null

  - name: READ
    transports: [http, serial, ble]
    critical: false
    wiring_status: partial
    expected_response_field: ok
    display:
      page: null
      field: null

  - name: NODES
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: false
    wiring_status: partial
    expected_response_field: ok
    display:
      page: page_1_network
      field: peerCount

  - name: REPEATER
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: true
    wiring_status: partial
    expected_response_field: ok
    display:
      page: page_3_transports
      field: loraActive

  - name: SLEEP
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: true
    wiring_status: partial
    expected_response_field: ok
    display:
      page: off
      field: null  # display goes dark

  - name: MSG
    transports: [http, serial, ble, lora, mqtt, espnow]
    critical: true
    wiring_status: implemented
    expected_response_field: ok
    display:
      page: null
      field: null
