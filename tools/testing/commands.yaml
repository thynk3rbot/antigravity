# ───────────────────────────────────────────────────────────────────
# Test Configuration
# ───────────────────────────────────────────────────────────────────

test_config:
  # Timeout for single command response (seconds)
  timeout: 5

  # Timeout for mesh commands (peers must respond)
  mesh_timeout: 12

  # MQTT response topic subscription pattern
  mqtt_response_topic: "magic/+/response"

  # HTTP endpoint base
  http_endpoint: "/api/cmd"

  # Number of retry attempts per command
  retry_attempts: 3

  # Delay between retries (seconds)
  retry_delay: 1

# ───────────────────────────────────────────────────────────────────
# Test Profiles
# ───────────────────────────────────────────────────────────────────

profiles:
  critical_only:
    description: "Critical command tests only (fast validation)"
    filters:
      critical: true

  full_suite:
    description: "All commands (comprehensive validation)"
    filters:
      critical: [true, false]

  http_only:
    description: "HTTP transport tests"
    filters:
      transports: [http]

  mqtt_only:
    description: "MQTT transport tests"
    filters:
      transports: [mqtt]

  quick_health:
    description: "Quick health check (STATUS + NODES + GPIO)"
    commands: [STATUS, NODES, GPIO]
