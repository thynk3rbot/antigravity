      fields: ["ok"]

  SLEEP:
    description: "Deep sleep (power saving)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<duration_ms>"
    expected_response:
      json: true
      fields: ["ok"]

  LIST:
    description: "List loaded products/profiles"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
