# Command Metadata & Test Configuration
# Used by integration_test.py, nightly_test.py, overdrive.py
# Last updated: 2026-03-31

commands:

  # ───────────────────────────────────────────────────────────────────
  # CRITICAL COMMANDS (core functionality, must work)
  # ───────────────────────────────────────────────────────────────────

  STATUS:
    description: "System status (battery, LoRa signal, peer count, uptime)"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["name", "ver", "bat_pct", "lora_rssi", "uptime"]

  GPIO:
    description: "GPIO control (set pin HIGH/LOW, MCP expander pins)"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: "<pin> <state>"
    expected_response:
      json: true
      fields: ["ok", "pin", "state"]

  READ:
    description: "Read pin state (digital input, ADC analog read)"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: "<pin>"
    expected_response:
      json: true
      fields: ["ok", "pin", "value"]

  RELAY:
    description: "Control relay (12V relay switching)"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: "<relay_num> <on|off>"
    expected_response:
      json: true
      fields: ["ok", "relay", "state"]

  SCHED:
    description: "Schedule management (list, add, clear scheduled tasks)"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: "<list|add|clear> [args]"
    expected_response:
      json: true
      fields: ["ok"]

  REBOOT:
    description: "System reboot"
    transports: [http, mqtt]
    critical: true
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["ok"]

  # ───────────────────────────────────────────────────────────────────
  # IMPORTANT COMMANDS (secondary functionality)
  # ───────────────────────────────────────────────────────────────────

  NODES:
    description: "List mesh nodes (peer discovery, neighbor table)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["ok", "nodes"]

  MSG:
    description: "Send message (LoRa, mesh, MQTT relay)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<target> <message>"
    expected_response:
      json: true
      fields: ["ok"]

  SETNAME:
    description: "Set node name (device ID)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<name>"
    expected_response:
      json: true
      fields: ["ok"]

  GETCONFIG:
    description: "Get configuration (WiFi, broker, NVS settings)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["ok"]

  HELP:
    description: "Command help (list all commands)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: false
      format: text

  VSTATUS:
    description: "Verbose status (extended telemetry)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["ok"]

  # ───────────────────────────────────────────────────────────────────
  # CONFIGURATION COMMANDS (setup, network, security)
  # ───────────────────────────────────────────────────────────────────

  SETWIFI:
    description: "Configure WiFi (SSID and password)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<ssid> <password>"
    expected_response:
      json: true
      fields: ["ok"]

  SETIP:
    description: "Set static IP address"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<ip> <gateway> <subnet>"
    expected_response:
      json: true
      fields: ["ok"]

  SETBROKER:
    description: "Set MQTT broker address"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<host> <port>"
    expected_response:
      json: true
      fields: ["ok"]

  SETKEY:
    description: "Set encryption key (LoRa AES)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: "<key_hex>"
    expected_response:
      json: true
      fields: ["ok"]

  FACTORY_RESET:
    description: "Factory reset (clear all NVS, restore defaults)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
      fields: ["ok"]

  # ───────────────────────────────────────────────────────────────────
  # ADVANCED / UTILITY COMMANDS
  # ───────────────────────────────────────────────────────────────────

  BLINK:
    description: "LED blink (diagnostic, confirm responsiveness)"
    transports: [http, mqtt]
    critical: false
    wiring_status: implemented
    args: ""
    expected_response:
      json: true
