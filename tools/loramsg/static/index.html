<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMX Messenger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0d1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #111124;
            border-bottom: 1px solid #1e1e3a;
        }
        header h1 { font-size: 1rem; font-weight: 600; color: #a78bfa; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
        }
        .status-dot.green { background: #34d399; }
        .status-dot.red   { background: #f87171; }
        #node-label { font-size: 0.75rem; color: #6b7280; margin-left: auto; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .msg.tx {
            align-self: flex-end;
            background: #4c1d95;
            border-bottom-right-radius: 4px;
        }
        .msg.rx {
            align-self: flex-start;
            background: #1e1e3a;
            border-bottom-left-radius: 4px;
        }
        .meta {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #111124;
            border-top: 1px solid #1e1e3a;
        }
        #dest-input {
            width: 80px;
            background: #1e1e3a;
            border: 1px solid #2e2e5a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 10px;
            font-size: 0.875rem;
            text-align: center;
        }
        #msg-input {
            flex: 1;
            background: #1e1e3a;
            border: 1px solid #2e2e5a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.875rem;
            outline: none;
        }
        #msg-input:focus { border-color: #7c3aed; }
        #send-btn {
            background: #7c3aed;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 8px 16px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        #send-btn:hover { background: #6d28d9; }
        #send-btn:disabled { background: #3730a3; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <div id="ws-dot" class="status-dot"></div>
        <h1>LMX Messenger</h1>
        <span id="node-label">node: —</span>
    </header>

    <div class="messages" id="messages"></div>

    <div class="input-bar">
        <input id="dest-input" type="text" placeholder="0xFF" value="0xFF" title="Destination (hex)">
        <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn" disabled>Send</button>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
