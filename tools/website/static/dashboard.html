<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live Dashboard — Magic</title>
  <link rel="stylesheet" href="/static/css/site.css">
  <style>
    .dash-header{
      display:flex;align-items:center;gap:1rem;
      padding:1rem 2rem;border-bottom:1px solid var(--border);
      background:var(--bg-hdr);
    }
    .dash-header h2{color:var(--text-bright);font-size:1.1rem;margin:0;}
    #connection-status{font-size:.85rem;color:var(--err);}

    .broadcast-bar{
      display:flex;gap:.75rem;padding:1rem 2rem;
      border-bottom:1px solid var(--border);
      background:var(--bg-card);
      align-items:center;
    }
    .broadcast-bar label{color:var(--text-dim);font-size:.85rem;white-space:nowrap;margin:0;}
    .broadcast-bar input{flex:1;}
    .broadcast-bar button{
      background:var(--gold);color:#000;border:none;
      padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;
      font-weight:600;font-size:.85rem;white-space:nowrap;
    }
    .broadcast-bar button:hover{background:#b8933e;}

    #client-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:1.25rem;
      padding:1.5rem 2rem;
    }
    .client-card{transition:border-color .2s;}
    .client-card:hover{border-color:var(--accent);}
    .cmd-input{display:flex;gap:.5rem;margin-top:.75rem;}
    .cmd-input input{flex:1;font-size:.8rem;}
    .cmd-input button{
      background:var(--accent);color:#000;border:none;
      padding:.4rem .85rem;border-radius:6px;cursor:pointer;
      font-size:.8rem;font-weight:600;
    }
    .cmd-input button:hover{background:var(--accent-hover);}

    .contacts-section{padding:1.5rem 2rem;}
    .contacts-section h3{
      color:var(--text-bright);margin-bottom:1rem;
      font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;
    }
    .table-wrap{overflow-x:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);}

    .empty-state{
      grid-column:1/-1;
      color:var(--text-dim);font-size:.9rem;
      text-align:center;padding:3rem;
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">
    <img src="/static/media/logo.png" alt="Magic">
    <span>Magic</span>
  </a>
  <a href="/features">Features</a>
  <a href="/dashboard">Dashboard</a>
  <a href="http://localhost:8001" target="_blank" rel="noopener">Docs</a>
  <a href="http://localhost:8000" target="_blank" rel="noopener">Magic App</a>
  <a href="/contact" class="nav-cta">Get in Touch</a>
</nav>

<div class="dash-header">
  <h2>Live Device Dashboard</h2>
  <span id="connection-status">● Connecting…</span>
</div>

<div class="broadcast-bar">
  <label>Broadcast:</label>
  <input type="text" id="broadcast-msg" placeholder="Command to all connected devices…">
  <button onclick="broadcast()">Send to All</button>
</div>

<div id="client-grid">
  <div class="empty-state">Waiting for devices to connect via MQTT…</div>
</div>

<div class="contacts-section">
  <h3>Contact Form Submissions</h3>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Message</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="contacts-body">
        <tr><td colspan="5" style="color:var(--text-dim)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <p>&copy; 2026 Magic. All rights reserved. &nbsp;|&nbsp; <a href="/docs">Documentation</a> &nbsp;|&nbsp; <a href="/contact">Contact</a></p>
</footer>

<!-- Load mqtt.js, then fetch config and inject dashboard.js -->
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script>
  fetch('/api/config')
    .then(r => r.json())
    .then(cfg => { window.MQTT_BROKER_URL = cfg.mqttBrokerUrl; })
    .catch(() => {})
    .finally(() => {
      const s = document.createElement('script');
      s.src = '/static/js/dashboard.js';
      document.body.appendChild(s);
    });
</script>

</body>
</html>
