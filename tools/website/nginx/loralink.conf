# Magic Corporate Website — Nginx Config
# Deploy to: /etc/nginx/sites-available/loralink
# Enable:    sudo ln -s /etc/nginx/sites-available/loralink /etc/nginx/sites-enabled/
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. loralink.io).

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # FastAPI — marketing site, API, and static files
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # EMQX WebSocket — mqtt.js connects here from the browser
    location /mqtt {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }
}
