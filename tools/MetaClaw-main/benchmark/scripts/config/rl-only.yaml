llm:
  api_base: ${BENCHMARK_BASE_URL}
  api_key: ${BENCHMARK_API_KEY}
  model_id: ${TINKER_MODEL}
  provider: custom
mode: rl
proxy:
  host: 0.0.0.0
  port: 30000
rl:
  enabled: true
  model: ${TINKER_MODEL}
  tinker_api_key: ${TINKER_KEY}
  prm_url: ${BENCHMARK_BASE_URL}
  prm_model: ${PRM_MODEL}
  prm_api_key: ${BENCHMARK_API_KEY}
  manual_train_trigger: true
  batch_size: 4
  lora_rank: 32
  evolver_model: ${PRM_MODEL}
scheduler:
  calendar:
    enabled: false
  enabled: false
skills:
  auto_evolve: false
  dir: ${METACLAW_ROOT}/memory_data/skills
  enabled: false
  retrieval_mode: template
  task_specific_top_k: 10
  top_k: 6
max_context_tokens: 50000