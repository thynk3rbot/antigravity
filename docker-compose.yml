version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: magic_mqtt
    ports:
      - "1883:1883"       # MQTT broker (standard port)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: magic_db
    environment:
      POSTGRES_USER: magic
      POSTGRES_PASSWORD: magic
      POSTGRES_DB: magic_cache
    ports:
      - "5432:5432"       # PostgreSQL (standard port)
    volumes:
      - magic_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: magic_timeseries
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=magic
      - DOCKER_INFLUXDB_INIT_PASSWORD=magic123
      - DOCKER_INFLUXDB_INIT_ORG=magic
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=magic-dev-token
    ports:
      - "8086:8086"       # InfluxDB (standard port)
    volumes:
      - magic_influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  telegraf:
    image: telegraf:1.30
    container_name: magic_ingest
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      - INFLUXDB_TOKEN=magic-dev-token
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    restart: unless-stopped

volumes:
  magic_db_data:
  magic_influxdb_data:
