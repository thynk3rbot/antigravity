name: Deploy NutriCalc to GitHub Pages & Netlify

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/nutribuddy/**'
      - '.github/workflows/deploy-nutribuddy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tools/nutribuddy/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Static Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          echo "✓ Validating HTML structure..."
          for file in tools/nutribuddy/static/*.html tools/nutribuddy/docs/*.html; do
            if [ -f "$file" ]; then
              echo "  Checking: $file"
              # Basic HTML validation: check for matching tags
              if grep -q "</html>" "$file"; then
                echo "    ✓ Valid HTML structure"
              else
                echo "    ✗ Missing closing HTML tag"
                exit 1
              fi
            fi
          done

      - name: Validate JSON files
        run: |
          echo "✓ Validating JSON configuration..."
          for file in tools/nutribuddy/*.json; do
            if [ -f "$file" ]; then
              echo "  Checking: $file"
              if python3 -m json.tool "$file" > /dev/null; then
                echo "    ✓ Valid JSON"
              else
                echo "    ✗ Invalid JSON"
                exit 1
              fi
            fi
          done

      - name: Check favicon and logo
        run: |
          echo "✓ Checking static assets..."
          [ -f "tools/nutribuddy/static/favicon.svg" ] && echo "  ✓ favicon.svg found" || (echo "  ✗ favicon.svg missing" && exit 1)
          [ -f "tools/nutribuddy/static/logo.svg" ] && echo "  ✓ logo.svg found" || (echo "  ✗ logo.svg missing" && exit 1)
          [ -f "tools/nutribuddy/docs/diagrams.html" ] && echo "  ✓ diagrams.html found" || (echo "  ✗ diagrams.html missing" && exit 1)

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy NutriCalc to build directory
        run: |
          mkdir -p build
          # Copy app and docs
          cp -r tools/nutribuddy/static build/
          cp -r tools/nutribuddy/docs build/
          # Create index.html redirect from root to app
          cat > build/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>NutriCalc - Hydroponic Nutrient Formula Solver</title>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
              <script>
                  window.location.href = '/static/';
              </script>
          </head>
          <body>
              <p>Redirecting to NutriCalc...</p>
          </body>
          </html>
          EOF
          echo "✓ Build directory prepared"
          ls -la build/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Log deployment
        run: echo "✓ Deployed to GitHub Pages at ${{ steps.deployment.outputs.page_url }}"

  deploy-netlify:
    name: Deploy to Netlify
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './tools/nutribuddy'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions [NutriCalc]"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1

      - name: Log deployment
        run: echo "✓ Deployed to Netlify"

  test-live-deployment:
    name: Test Live Deployment
    needs: [deploy-github-pages, deploy-netlify]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 10

      - name: Test GitHub Pages
        run: |
          echo "Testing GitHub Pages deployment..."
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/static/"

          curl -sSf "$URL" > /dev/null && echo "✓ GitHub Pages is live" || echo "⚠ GitHub Pages status unknown (may be still deploying)"

      - name: Test file integrity
        run: |
          echo "Verifying source files..."
          [ -f "tools/nutribuddy/static/index.html" ] && echo "  ✓ App loaded" || (echo "  ✗ App missing" && exit 1)
          [ -f "tools/nutribuddy/docs/index.html" ] && echo "  ✓ Docs loaded" || (echo "  ✗ Docs missing" && exit 1)
          echo "✓ All files verified"
