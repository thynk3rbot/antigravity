# Telegraf Configuration for Magic V3
# Location: plugins/_infrastructure/telegraf.conf

[agent]
  interval = "5s"
  round_interval = true
  flush_interval = "10s"
  hostname = "magic-telegraf"

# ── Input: MQTT Consumer ──────────────────────────

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_BROKER}:${MQTT_PORT}"]
  topics = [
    "magic/+/telemetry",
    "magic/+/status",
    "magic/+/mx/+"
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "telegraf-magic"
  data_format = "json"

  # Extract node_id from topic: magic/{node_id}/telemetry
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "magic/+/telemetry"
    measurement = "telemetry"
    tags = "_/node_id/_"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "magic/+/status"
    measurement = "device_status"
    tags = "_/node_id/_"

  # Support for new Mx Framework topics: magic/{node_id}/mx/{subject}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "magic/+/mx/+"
    measurement = "mx_telemetry"
    tags = "_/node_id/_/subject"

# ── Output: InfluxDB v2 ───────────────────────────

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "magic"
  bucket = "telemetry"
