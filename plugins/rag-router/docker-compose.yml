# RAG Router (lightweight — uses existing Dify stack on port 8400)
# docker compose up -d

services:

  # ---- RAG Router (custom microservice) ----
  rag-router:
    build: .
    ports:
      - "8403:8403"
    env_file: .env
    environment:
      - DIFY_BASE_URL=http://host.docker.internal:8400/v1
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - emqx
    restart: unless-stopped

  # ---- MQTT Broker ----
  emqx:
    image: emqx/emqx:5.5
    ports:
      - "1884:1883"
      - "18084:18083"
    environment:
      EMQX_NAME: magic-broker
      EMQX_LOADED_PLUGINS: "emqx_dashboard"
    volumes:
      - emqx_data:/opt/emqx/data
    restart: unless-stopped

volumes:
  emqx_data:
